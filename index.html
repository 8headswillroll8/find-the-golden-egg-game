<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Easter game | Find the golden egg</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/svg+xml" href="assets/golden-egg.svg" />
  </head>
  <body>
    <main>
      <div class="container">
        <section class="game">
          <div class="game__header">
            <h1 class="game__title">Find the hidden golden egg</h1>
            <p class="game__description">Click around. Trust your luck.</p>
          </div>

          <div class="game__grid">
            <img class="game__item" src="assets/easter-egg-01.svg" alt="" />
            <img class="game__item" src="assets/easter-egg-02.svg" alt="" />
            <img class="game__item" src="assets/easter-egg-03.svg" alt="" />
            <img class="game__item" src="assets/easter-egg-04.svg" alt="" />
            <img class="game__item" src="assets/easter-egg-05.svg" alt="" />
            <img class="game__item" src="assets/easter-egg-06.svg" alt="" />
            <img class="game__item" src="assets/easter-egg-07.svg" alt="" />
            <img class="game__item" src="assets/easter-egg-08.svg" alt="" />
            <img class="game__item" src="assets/easter-egg-09.svg" alt="" />
          </div>
          <button class="btn is-hidden">Play again?</button>
        </section>
      </div>
    </main>
    <script src="js/script.js"></script>
  </body>
</html>
